<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FitTracker Custom</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #121212; --card-bg: #1E1E1E; --text: #F0F0F0;
            --muted: #A0A0A0; --border: #2C2C2C; --accent: #007AFF; 
            --glow: 0 0 20px rgba(0, 122, 255, 0.4); --radius: 20px;
        }
        [data-theme="light"] {
            --bg: #F5F5F7; --card-bg: #FFFFFF; --text: #1C1C1E;
            --muted: #8E8E93; --border: #E5E5EA; --accent: #FF3B30; 
            --glow: 0 0 20px rgba(255, 59, 48, 0.2);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; overflow: hidden; transition: 0.3s; }
        .container { width: 100%; max-width: 420px; height: 100vh; display: flex; flex-direction: column; padding: 15px; position: relative; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
        .theme-btn { background: var(--card-bg); border: 1px solid var(--border); border-radius: 50%; width: 40px; height: 40px; cursor: pointer; color: var(--text); display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .bubble-cluster { flex: 1; position: relative; width: 100%; display: flex; align-items: center; justify-content: center; }
        .bubble { border-radius: 50%; background-color: var(--card-bg); border: 2px solid var(--accent); box-shadow: var(--glow); transition: all 0.2s; cursor: pointer; position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .bubble-completed { width: 42vh; height: 42vh; max-width: 230px; max-height: 230px; z-index: 5; border-color: #A855F7; }
        .bubble-target { width: 24vh; height: 24vh; max-width: 125px; max-height: 125px; top: 5%; left: 5%; border-color: #007AFF; }
        .bubble-total { width: 26vh; height: 26vh; max-width: 140px; max-height: 140px; bottom: 15%; right: 5%; border-color: #F97316; }
        .count-val { font-size: 10vh; font-weight: 800; line-height: 1; }
        .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
        .bubble-actions { position: absolute; right: 5%; top: 30%; display: flex; flex-direction: column; gap: 12px; z-index: 10; }
        .bubble-action { width: 48px; height: 48px; border-radius: 50%; background-color: var(--card-bg); border: 2px solid #22C55E; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }
        .bottom-nav { background-color: var(--card-bg); border-radius: var(--radius); padding: 8px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; margin-bottom: 10px; min-height: 60px; }
        .nav-item { padding: 12px 18px; background-color: var(--bg); border-radius: 12px; font-weight: 600; font-size: 13px; color: var(--muted); border: 1px solid var(--border); white-space: nowrap; flex-shrink: 0; cursor: pointer; }
        .nav-item.active { background-color: var(--accent); color: white; border-color: var(--accent); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .overlay.show { display: flex; }
        .modal { background: var(--card-bg); border-radius: var(--radius); padding: 25px; width: 85%; max-width: 340px; text-align: center; border: 1px solid var(--border); max-height: 80vh; overflow-y: auto; }
        .btn { padding: 14px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; color: white; font-size: 14px; width: 100%; margin-top: 8px; }
        .ex-list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid var(--border); }
        .input-dark { width: 100%; padding: 12px; background: #000; color: #fff; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px; font-size: 16px; }
        .ach-icon { font-size: 24px; filter: grayscale(1); opacity: 0.3; transition: 0.5s; }
        .ach-icon.unlocked { filter: grayscale(0); opacity: 1; transform: scale(1.2); }
    </style>
</head>
<body data-theme="dark">

<div class="container" id="appContent" style="display:none;">
    <div class="header">
        <h1 id="exerciseTitle">Pompki</h1>
        <div style="display:flex; gap:10px;">
            <button class="theme-btn" onclick="openModal('overlayManage')">⚙️</button>
            <button class="theme-btn" onclick="toggleTheme()" id="themeIcon">☀️</button>
        </div>
    </div>

    <div style="display:flex; justify-content:center; gap:10px; margin: 10px 0;">
        <span class="ach-icon" id="ach-10">🥉</span>
        <span class="ach-icon" id="ach-50">🥈</span>
        <span class="ach-icon" id="ach-100">🥇</span>
        <span class="ach-icon" id="ach-target">🏆</span>
    </div>

    <div class="bubble-cluster">
        <div class="bubble bubble-target" onclick="changeGoal()">
            <span style="font-size: 26px; font-weight: 800;" id="targetDisplay">100</span>
            <span class="label">Cel</span>
        </div>
        <div class="bubble bubble-completed" onclick="addReps(10)">
            <span class="count-val" id="dailyDisplay">0</span>
            <span class="label">Dzisiaj</span>
            <div style="position: absolute; top: 15%; right: 15%; font-weight: 800; color: #34C759;">+10</div>
        </div>
        <div class="bubble bubble-total">
            <span style="font-size: 30px; font-weight: 800;" id="totalDisplay">0</span>
            <span class="label">Razem</span>
        </div>
        <div class="bubble-actions">
            <div class="bubble-action" onclick="openModal('overlayTimer')">⏱</div>
            <div class="bubble-action" onclick="logout()">🚪</div>
        </div>
    </div>

    <div class="bottom-nav" id="exerciseNav"></div>
</div>

<div class="overlay show" id="overlayLogin">
    <div class="modal">
        <h2>Witaj w FitTracker</h2>
        <p style="color:var(--muted); margin: 15px 0;">Zaloguj się przez Google, aby zarządzać swoimi ćwiczeniami.</p>
        <button class="btn" style="background:#EA4335" onclick="login()">Zaloguj przez Google</button>
    </div>
</div>

<div class="overlay" id="overlayManage" onclick="closeModal('overlayManage')">
    <div class="modal" onclick="event.stopPropagation()">
        <h3>Twoje ćwiczenia</h3>
        <div id="manageList" style="margin: 15px 0;"></div>
        <input type="text" id="newExInput" class="input-dark" placeholder="Nazwa (np. Podciągania)">
        <button class="btn" style="background: var(--accent)" onclick="addNewExercise()">DODAJ NOWE</button>
        <button class="btn" style="background: #8E8E93" onclick="closeModal('overlayManage')">ZAMKNIJ</button>
    </div>
</div>

<div class="overlay" id="overlayTimer" onclick="closeModal('overlayTimer')">
    <div class="modal" onclick="event.stopPropagation()">
        <input type="number" id="timerInput" class="input-dark" style="text-align:center; font-size:24px" value="60">
        <div id="timerDisplay" style="font-size: 50px; font-weight: 800; margin: 10px 0;">01:00</div>
        <button class="btn" id="timerBtn" style="background:#34C759" onclick="toggleTimer()">START</button>
        <button class="btn" style="background:#8E8E93" onclick="resetTimer()">RESET</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, increment, deleteField } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCaANa-QTYdUp1GSy438hIeHLAMLCJNwwM",
        authDomain: "fittracker-pwa.firebaseapp.com",
        projectId: "fittracker-pwa",
        storageBucket: "fittracker-pwa.firebasestorage.app",
        messagingSenderId: "197147813147",
        appId: "1:197147813147:web:ee76909a4c773d6d481fbe"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;
    let currentExercise = 'pompki';
    let allExercises = [];
    let timerInterval, timeLeft = 60, isTimerRunning = false;

    // AUTH
    window.login = () => signInWithPopup(auth, provider);
    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('overlayLogin').classList.remove('show');
            document.getElementById('appContent').style.display = 'flex';
            fetchData();
        } else {
            document.getElementById('overlayLogin').classList.add('show');
            document.getElementById('appContent').style.display = 'none';
        }
    });

    // DATA LOGIC
    async function fetchData() {
        if (!currentUser) return;
        const docRef = doc(db, "users", currentUser.uid);
        const docSnap = await getDoc(docRef);
        
        const today = new Date().toLocaleDateString();
        let data = { 
            lastUpdate: today,
            exercises: ['pompki', 'przysiady', 'brzuszki'],
            pompki: { daily: 0, total: 0, goal: 100 },
            przysiady: { daily: 0, total: 0, goal: 100 },
            brzuszki: { daily: 0, total: 0, goal: 100 }
        };

        if (docSnap.exists()) {
            data = docSnap.data();
            if (data.lastUpdate !== today) {
                data.exercises.forEach(ex => { if(data[ex]) data[ex].daily = 0; });
                data.lastUpdate = today;
                await setDoc(docRef, data);
            }
        } else {
            await setDoc(docRef, data);
        }

        allExercises = data.exercises || ['pompki'];
        if (!allExercises.includes(currentExercise)) currentExercise = allExercises[0];
        
        renderNav();
        renderManageList();

        const ex = data[currentExercise] || { daily: 0, total: 0, goal: 100 };
        document.getElementById('exerciseTitle').innerText = currentExercise.charAt(0).toUpperCase() + currentExercise.slice(1);
        document.getElementById('dailyDisplay').innerText = ex.daily;
        document.getElementById('totalDisplay').innerText = ex.total;
        document.getElementById('targetDisplay').innerText = ex.goal;
        
        updateAchievements(ex);
    }

    function renderNav() {
        document.getElementById('exerciseNav').innerHTML = allExercises.map(ex => `
            <div class="nav-item ${ex === currentExercise ? 'active' : ''}" onclick="window.switchExercise('${ex}')">
                ${ex.charAt(0).toUpperCase() + ex.slice(1)}
            </div>
        `).join('');
    }

    function renderManageList() {
        document.getElementById('manageList').innerHTML = allExercises.map(ex => `
            <div class="ex-list-item">
                <span>${ex}</span>
                <button onclick="window.deleteExercise('${ex}')" style="background:none; border:none; color:#FF3B30; font-weight:800; cursor:pointer">USUŃ</button>
            </div>
        `).join('');
    }

    window.addNewExercise = async () => {
        const input = document.getElementById('newExInput');
        const name = input.value.trim().toLowerCase();
        if (name && !allExercises.includes(name)) {
            allExercises.push(name);
            const docRef = doc(db, "users", currentUser.uid);
            await updateDoc(docRef, {
                exercises: allExercises,
                [name]: { daily: 0, total: 0, goal: 100 }
            });
            input.value = '';
            fetchData();
        }
    };

    window.deleteExercise = async (name) => {
        if (allExercises.length <= 1) return alert("Zostaw chociaż jedno ćwiczenie!");
        if (confirm(`Czy na pewno usunąć ${name}?`)) {
            allExercises = allExercises.filter(e => e !== name);
            const docRef = doc(db, "users", currentUser.uid);
            await updateDoc(docRef, { exercises: allExercises, [name]: deleteField() });
            fetchData();
        }
    };

    window.switchExercise = (name) => { currentExercise = name; fetchData(); };

    window.addReps = async (n) => {
        const docRef = doc(db, "users", currentUser.uid);
        await updateDoc(docRef, {
            [`${currentExercise}.daily`]: increment(n),
            [`${currentExercise}.total`]: increment(n)
        });
        fetchData();
    };

    window.changeGoal = async () => {
        const newGoal = prompt("Ustaw nowy cel:", document.getElementById('targetDisplay').innerText);
        if (newGoal && !isNaN(newGoal)) {
            const docRef = doc(db, "users", currentUser.uid);
            await updateDoc(docRef, { [`${currentExercise}.goal`]: parseInt(newGoal) });
            fetchData();
        }
    };

    // UI & TIMER
    window.openModal = (id) => document.getElementById(id).classList.add('show');
    window.closeModal = (id) => document.getElementById(id).classList.remove('show');
    
    window.toggleTheme = () => {
        const theme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', theme);
        document.getElementById('themeIcon').innerText = theme === 'dark' ? '☀️' : '🌙';
    };

    window.toggleTimer = () => {
        if (isTimerRunning) {
            clearInterval(timerInterval); isTimerRunning = false;
            document.getElementById('timerBtn').innerText = "WZNÓW";
        } else {
            if (timeLeft === 60) timeLeft = parseInt(document.getElementById('timerInput').value);
            isTimerRunning = true;
            document.getElementById('timerBtn').innerText = "PAUZA";
            timerInterval = setInterval(() => {
                if (timeLeft > 0) { timeLeft--; updateTimerUI(); }
                else { clearInterval(timerInterval); alert("Czas minął!"); resetTimer(); }
            }, 1000);
        }
    };

    window.resetTimer = () => {
        clearInterval(timerInterval); isTimerRunning = false;
        timeLeft = parseInt(document.getElementById('timerInput').value);
        updateTimerUI();
        document.getElementById('timerBtn').innerText = "START";
    };

    function updateTimerUI() {
        const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
        document.getElementById('timerDisplay').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function updateAchievements(ex) {
        document.getElementById('ach-10').classList.toggle('unlocked', ex.daily >= 10);
        document.getElementById('ach-50').classList.toggle('unlocked', ex.daily >= 50);
        document.getElementById('ach-100').classList.toggle('unlocked', ex.daily >= 100);
        document.getElementById('ach-target').classList.toggle('unlocked', ex.daily >= ex.goal);
    }
</script>
</body>
</html>
